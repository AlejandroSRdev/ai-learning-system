<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Learning System</title>
</head>
<body>

  <div id="section-1">
    <input id="level" type="text" placeholder="level">
    <input id="goal" type="text" placeholder="goal">
    <input id="current_topic" type="text" placeholder="current_topic">
    <button onclick="createStudent()">Create Student</button>
    <p id="student-display" style="display:none"></p>
  </div>

  <div id="section-2" style="display:none">
    <button onclick="getExplanation()">Get Explanation</button>
    <button onclick="getEvaluation()">Get Evaluation</button>
    <button onclick="submitCorrection()">Submit Correction</button>
  </div>

  <div id="section-3" style="display:none">
    <h2 id="exp-title"></h2>
    <p id="exp-body"></p>
    <ul id="exp-concepts"></ul>
    <p id="exp-difficulty"></p>
  </div>

  <div id="section-4" style="display:none">
    <p id="progress">Answered 0 / 10</p>
    <div id="questions-container"></div>
  </div>

  <div id="section-5" style="display:none">
    <p id="result-score"></p>
    <p id="result-decision"></p>
  </div>

  <p id="error-msg" style="display:none; color:red;"></p>

  <script type="module" src="/main.js"></script>

</body>
</html>
